openapi: 3.0.3
info:
  title: DCAT3 Data Space API
  description: REST API para gestionar espacios de datos segun el modelo DCAT3
  version: 1.0.0

servers:
  - url: https://api.example.org


#__PATHS__
paths:
  # ____Catalogs____
  /catalogs:
    get:
      summary: Lista de catalogos
      parameters: # Filtros de busqueda:
        - in: query  # Por tema
          name: theme
          required: false
          schema:
            type: string
        - in: query  # Por palabra clave
          name: keyword
          required: false
          schema:
            type: string
        - in: query  # Por publicador
          name: publisher
          required: false
          schema:
            type: string
        - in: query  # Por derechos de acceso
          name: access_rights
          required: false
          schema:
            type: string
        - in: query  # Por licencia
          name: license
          required: false
          schema:
            type: string
        - in: query  # Por estandar
          name: conforms_to
          required: false
          schema:
            type: string
        - in: query  # Por estado
          name: status
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de catalogos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Catalog'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear nuevo catalogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Catalog'
      responses:
        '201':
          description: Catalogo creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'


  /catalogs/{catalog_id}:
    get:
      summary: Obtener un catalogo concreto
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalogo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Actualizar catalogo
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Catalog'
      responses:
        '200':
          description: Catalogo actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Borrar catalogo
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Catalogo eliminado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
          
  /catalogs/{catalog_id}/catalog_records:
    get:
      summary: Listar catalog_records de un catálogo concreto
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema: 
            type: string
      responses:
        '200':
          description: Llista de datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
          
  /catalog_records:
    get:
      summary: Listar todos los catalog_records
      parameters:
        - in: query
          name: catalog_id
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Llista de datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear nuevo catalog_record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Catalog_record'
      responses:
        '201':
          description: Catalogo creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
          
  /catalog_record/{catalog_record_id}:
    get:
      summary: Listar un catalog_record concreto
      parameters:
        - in: path
          name: catalog_record_id
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Catalogo creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Editar un catalog_record concreto
      parameters:
        - in: path
          name: catalog_record_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Catalog_record'
      responses:
        '200':
          description: Catalogo actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Borrar catalog_record
      parameters:
        - in: path
          name: catalog_record_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Catalog_record eliminado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /catalogs/{catalog_id}/datasets:
    get:
      summary: Listar datasets de catálogo con filtros
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
        - in: query     # Filtros de busqueda:
          name: theme   # Por tema
          required: false
          schema:
            type: string
        - in: query
          name: keyword # Por palabra clave
          required: false
          schema:
            type: string
        - in: query
          name: spatial_coverage # Por cobertura espacial
          required: false
          schema:
            type: string
        - in: query
          name: temporal_start # Por inicio temporal
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: temporal_end  # Por fin temporal
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: language  # Por idioma
          required: false
          schema:
            type: string
        - in: query
          name: access_rights  # Por derechos de acceso
          required: false
          schema:
            type: string
        - in: query
          name: license  # Por licencia
          required: false
          schema:
            type: string
        - in: query
          name: publisher  # Por publicador
          required: false
          schema:
            type: string
        - in: query
          name: conforms_to  # Por estandar
          required: false
          schema:
            type: string
        - in: query
          name: status  # Por estado
          required: false
          schema:
            type: string
        - in: query
          name: title  # Por titulo
          required: false
          schema:
            type: string
        - in: query
          name: replaces  # Por reemplazamiento
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Llista de datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear dataset en un catalogo
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Dataset'
      responses:
        '201':
          description: Dataset creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /catalogs/{catalog_id}/datasets/{dataset_id}:
    get:
      summary: Obtener un dataset
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
        - in: path
          name: dataset_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dataset
          content:
            application/json:
              schema:
