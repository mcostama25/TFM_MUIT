            type: string
        - in: query
          name: mediaType  # Por tipo de medio
          required: false
          schema:
            type: string
        - in: query
          name: conforms_to  # Por estandar
          required: false
          schema:
            type: string
        - in: query
          name: title  # Por titulo
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de distribuciones del dataset.
          content:
            application/json:
