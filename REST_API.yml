          required: false
          schema:
            type: string
        - in: query
          name: compressFormat # Por formato de compresión
          required: false
          schema:
            type: string
        - in: query
          name: mediaType  # Por tipo de medio
          required: false
          schema:
            type: string
        - in: query
          name: conforms_to  # Por estandar
          required: false
          schema:
            type: string
        - in: query
          name: title  # Por titulo
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de distribucions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Distributions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear distribucion para un dataset
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
        - in: path
          name: dataset_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Distributions'
      responses:
        '201':
          description: Distribución creada
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        
  /catalogs/{catalog_id}/datasets/{dataset_id}/dataservices:
    get:
      summary: Listar servicios de datos de un dataset
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
        - in: path
          name: dataset_id
          required: true
          schema:
            type: string
        - in: query     # Filtros de busqueda:
          name: theme   # Por tema
          required: false
          schema:
            type: string
        - in: query
          name: keyword # Por palabra clave
          required: false
          schema:
            type: string
        - in: query
          name: language  # Por idioma
          required: false
          schema:
            type: string
        - in: query
          name: access_rights  # Por derechos de acceso
          required: false
          schema:
            type: string
        - in: query
          name: license  # Por licencia
          required: false
          schema:
            type: string
        - in: query
          name: publisher  # Por publicador
          required: false
          schema:
            type: string
        - in: query
          name: creator  # Por creador
          required: false
          schema:
            type: string
        - in: query
          name: conforms_to  # Por estandar
          required: false
          schema:
            type: string
        - in: query
          name: status  # Por estado
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de servicios de datos del dataset.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataService'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear servicio de datos para un dataset
      parameters:
        - in: path
          name: catalog_id
          required: true
          schema:
            type: string
        - in: path
          name: dataset_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataService'
      responses:
        '201':
          description: Servicio de datos creado correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  # ____Datasets____
  /datasets:
