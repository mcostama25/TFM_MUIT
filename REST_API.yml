          $ref: '#/components/responses/InternalError'
          
  /datasetseries/{dataset_series_id}/datasets:
    get:
      summary: Datasets dentro de un datasetseries
      parameters:
        - in: path
          name: dataset_series_id
          required: true
          schema:
            type: string
        - in: query     # Filtros de busqueda:
          name: theme   # Por tema
          required: false
          schema:
            type: string
        - in: query
          name: keyword # Por palabra clave
          required: false
          schema:
            type: string
        - in: query
          name: spatial_coverage # Por cobertura espacial
          required: false
          schema:
            type: string
        - in: query
          name: temporal_start # Por inicio temporal
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: temporal_end  # Por fin temporal
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: language  # Por idioma
          required: false
          schema:
            type: string
        - in: query
          name: access_rights  # Por derechos de acceso
          required: false
          schema:
            type: string
        - in: query
          name: license  # Por licencia
          required: false
          schema:
            type: string
        - in: query
          name: publisher  # Por publicador
          required: false
          schema:
            type: string
        - in: query
          name: conforms_to  # Por estandar
          required: false
          schema:
            type: string
        - in: query
          name: status  # Por estado
          required: false
          schema:
            type: string
        - in: query
          name: title  # Por titulo
          required: false
          schema:
            type: string
        - in: query
          name: replaces  # Por reemplazamiento
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Llista datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
        '404':
          $ref: '#/components/responses/NotFound'

