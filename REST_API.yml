          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataService'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Crear servicio de datos
      requestBody:
        required: true
        content:
