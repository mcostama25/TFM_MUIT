apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-kafka-consumer-config
  namespace: datahub1
data:
  # Kafka connection (scalar overrides — topics stay in config.toml baked into the image)
  KAFKA__BOOTSTRAP_SERVERS: "prerequisites-kafka:9092"
  KAFKA__GROUP_ID: "datahub-dcat-consumer"
  KAFKA__AUTO_OFFSET_RESET: "earliest"
  # Schema Registry — DataHub GMS exposes SR-compatible API at /schema-registry/api/
  SCHEMA_REGISTRY__URL: "http://datahub-datahub-gms:8080"
  # Health probe port
  SERVER__PORT: "3001"
