apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-eu-recipe
  namespace: datahub1
data:
  DataEU.yaml: |
    source:
      type: openapi
      config:
        name: "DataEU_OpenAPI"
        swagger_file: "/openapi.yaml"
        url: "https://data.europa.eu/api/hub/search"

    sink:
      type: datahub-rest
      config:
        server: "http://datahub-datahub-gms:8080"
